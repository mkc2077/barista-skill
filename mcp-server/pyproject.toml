[project]
name = "barista-mcp-server"
version = "2.0.0"
description = "Barista Skill MCP Server - 咖啡师教练 MCP 服务"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }

dependencies = [
    "mcp[cli]>=1.2.0",
]

[project.scripts]
barista-mcp = "server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]

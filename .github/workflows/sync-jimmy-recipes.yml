name: Sync Jimmy craft recipes

on:
  schedule:
    # 每日 06:00 UTC 检测博主新视频并尝试同步（需配置 XHS_SESSION_COOKIE Secret）
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare config from secret
        env:
          XHS_SESSION_COOKIE: ${{ secrets.XHS_SESSION_COOKIE }}
          XHS_USER_ID: ${{ secrets.XHS_USER_ID }}
        run: |
          cat > data/jimmy_sync_config.json <<EOF
          {
            "blogger": {
              "name": "吉米-咖啡届直男",
              "xhs_id": "Jim950707",
              "user_id": "${XHS_USER_ID:-<XHS_NUMERIC_USER_ID>}"
            },
            "data_path": "data/jimmy_craft_recipes.json",
            "state_path": "data/jimmy_sync_state.json",
            "log_path": "data/jimmy_sync_log.json",
            "auth": {
              "cookie": "${XHS_SESSION_COOKIE:-<YOUR_XHS_SESSION_COOKIE>}",
              "user_agent": "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36"
            },
            "source": "xhs",
            "extractor": "stub",
            "manual_drop_path": "data/jimmy_new_videos.json",
            "provenance_policy": "VERIFIED_ONLY"
          }
          EOF

      - name: Run sync
        run: python scripts/sync_jimmy_recipes.py --sync

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- data/jimmy_craft_recipes.json data/jimmy_sync_state.json data/jimmy_sync_log.json; then
            git add data/jimmy_craft_recipes.json data/jimmy_sync_state.json data/jimmy_sync_log.json
            git commit -m "chore: sync jimmy craft recipes ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No recipe changes."
          fi
